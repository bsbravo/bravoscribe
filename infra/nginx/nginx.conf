# nginx.conf — local dev gateway
# Mirrors Azure API Management (APIM) behaviour in production.
# All frontends talk to http://localhost:8080 regardless of environment.

events {
  worker_connections 1024;
}

http {

  # SECURITY NOTE — LOCAL DEV DEVIATION:
  # JWT validation is NOT performed by nginx locally.
  # Each Spring Boot service validates the JWT via Spring Security.
  # In production, APIM validates JWT before requests reach services.
  # This means local dev has weaker gateway-level security than production.
  # Always verify that protected endpoints return 401 without a valid JWT
  # in the Definition of Done tests for each service.

  # Docker's internal DNS resolver — resolves upstreams at request time, not startup
  # This allows nginx to start even when Spring Boot services are not yet running
  resolver 127.0.0.11 valid=10s;
  resolver_timeout 5s;

  server {
    listen 8080;
    
    # Upstream variables — resolved lazily by Docker DNS
    set $user_service      user-service:8081;
    set $journal_service   journal-service:8082;
    set $notification_service notification-service:8083;

    # CORS headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

    # Health check — used by Phase 1 Definition of Done
    # curl http://localhost:8080/health → 200 ok
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Handle preflight
    if ($request_method = 'OPTIONS') {
      return 204;
    }

    # Public auth endpoints — no JWT required
    location /api/users/login {
      proxy_pass http://$user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/users/register {
      proxy_pass http://$user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/users/password-reset/ {
      proxy_pass http://$user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/users/refresh {
      proxy_pass http://$user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # All other user routes — JWT validated by user-service Spring Security
    location /api/users/ {
      proxy_pass http://$user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    # Journal routes — JWT validated by journal-service Spring Security
    location /api/journal/ {
      proxy_pass http://$journal_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    # Notification Service has no REST endpoints — internal Kafka-driven only
    # Direct HTTP access is blocked per SYSTEM_SPEC §3.2 privacy rule

    # Swagger UI — accessible per service during local dev
    location /users/swagger-ui/ {
      proxy_pass http://$user_service/swagger-ui/;
    }

    location /journal/swagger-ui/ {
      proxy_pass http://$journal_service/swagger-ui/;
    }
  }
}
