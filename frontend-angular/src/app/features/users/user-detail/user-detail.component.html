<a routerLink="/users" class="back-link">&larr; Back to users</a>

@if (loading$ | async) {
  <div class="loading">
    <mat-spinner diameter="32"></mat-spinner>
  </div>
} @else if (notFound$ | async) {
  <p class="empty-state">User not found.</p>
} @else if (user$ | async; as user) {
  <mat-card class="detail-card">
    <mat-card-header>
      <mat-card-title>{{ user.name }}</mat-card-title>
      <mat-card-subtitle>{{ user.email }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <dl class="detail-list">
        <dt>Role</dt>
        <dd>{{ user.role }}</dd>

        <dt>Status</dt>
        <dd>
          <mat-chip [class.chip-inactive]="!user.active" [class.chip-active]="user.active">
            {{ user.active ? 'Active' : 'Deactivated' }}
          </mat-chip>
        </dd>

        <dt>Joined</dt>
        <dd>{{ user.createdAt | date: 'medium' }}</dd>
      </dl>
    </mat-card-content>

    <mat-card-actions>
      <button mat-flat-button color="warn" [disabled]="!user.active" (click)="deactivate()">
        Deactivate account
      </button>
    </mat-card-actions>
  </mat-card>
}
